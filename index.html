<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camping Sim</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: monospace; }
canvas { display: block; }
#controls {
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.7);
  color: #ddd;
  padding: 16px;
  border-radius: 8px;
  min-width: 200px;
  z-index: 100;
}
#controls h3 { margin-bottom: 12px; color: #f0c040; font-size: 14px; }
.control-row { margin-bottom: 10px; }
.control-row label { display: block; font-size: 11px; margin-bottom: 4px; color: #aaa; }
.control-row input[type="range"] { width: 100%; }
.control-row button {
  background: #333;
  color: #ddd;
  border: 1px solid #555;
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 11px;
  margin-right: 4px;
}
.control-row button.active { background: #5a8; color: #fff; border-color: #5a8; }
.control-row button:hover { background: #444; }
#time-display { font-size: 11px; color: #f0c040; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div id="controls">
  <h3>⛺ CAMP CONTROLS</h3>
  <div class="control-row">
    <label>Time of Day</label>
    <input type="range" id="time-slider" min="0" max="24" step="0.1" value="13">
    <div id="time-display">13:00</div>
  </div>
  <div class="control-row">
    <label>Weather</label>
    <button id="btn-clear" class="active">Clear</button>
    <button id="btn-rain">Rain</button>
    <button id="btn-snow">Snow</button>
  </div>
  <div class="control-row">
    <label>Wind</label>
    <input type="range" id="wind-slider" min="0" max="100" step="1" value="10">
  </div>
  <div class="control-row">
    <label>Fog</label>
    <input type="range" id="fog-slider" min="0" max="100" step="1" value="0">
  </div>
  <div class="control-row">
    <label>Tent Color</label>
    <div id="tent-colors" style="display:flex;gap:4px;flex-wrap:wrap;">
      <button data-color="cc5522" style="background:#cc5522;width:24px;height:24px;border:2px solid #fff;border-radius:4px;cursor:pointer;"></button>
      <button data-color="2266aa" style="background:#2266aa;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="337733" style="background:#337733;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="aa2222" style="background:#aa2222;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="888888" style="background:#888888;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="ddaa22" style="background:#ddaa22;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="553388" style="background:#553388;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="222222" style="background:#222222;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
      <button data-color="ee66aa" style="background:#ee66aa;width:24px;height:24px;border:2px solid transparent;border-radius:4px;cursor:pointer;"></button>
    </div>
  </div>
  <div class="control-row">
    <label>Tent Style</label>
    <select id="tent-style" style="width:100%;background:#333;color:#ddd;border:1px solid #555;padding:4px;border-radius:4px;font-size:11px;">
      <option value="aframe">A-Frame (2P)</option>
      <option value="dome">Dome (4P)</option>
      <option value="cabin">Cabin (6P)</option>
      <option value="tunnel">Tunnel (4P)</option>

  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
const _realRandom = Math.random;
Math.random = mulberry32(12345);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(12, 8, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.05;
controls.minDistance = 5;
controls.maxDistance = 36;
controls.update();

let timeOfDay = 13.0;
let weather = 'clear';
let windStrength = 10;
let fogDensity = 0;

const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const moonLight = new THREE.DirectionalLight(0x4466aa, 0.15);
scene.add(moonLight);

const ambientLight = new THREE.AmbientLight(0x404040, 0.3);
scene.add(ambientLight);

const fireLight = new THREE.PointLight(0xff6622, 2, 12);
fireLight.position.set(0, 1.2, 0);
fireLight.castShadow = true;
scene.add(fireLight);

const fireLight2 = new THREE.PointLight(0xff4400, 1, 8);
fireLight2.position.set(0.2, 0.8, 0.1);
scene.add(fireLight2);

scene.fog = new THREE.FogExp2(0x88aacc, 0.0);

// --- TERRAIN ---
const WORLD_RADIUS = 80;
const groundGeo = new THREE.SphereGeometry(WORLD_RADIUS, 64, 64, 0, Math.PI * 2, 0, Math.PI / 3);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a5a2a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.position.y = -WORLD_RADIUS;
ground.receiveShadow = true;
scene.add(ground);

function getGroundY(x, z) {
  const dist = Math.sqrt(x * x + z * z);
  return Math.sqrt(Math.max(0, WORLD_RADIUS * WORLD_RADIUS - dist * dist)) - WORLD_RADIUS;
}

// --- CREEK ---
function buildCreek() {
  const creekGroup = new THREE.Group();
  const points = [
    new THREE.Vector2(-80, 12),
    new THREE.Vector2(-68, 10),
    new THREE.Vector2(-55, 5),
    new THREE.Vector2(-44, 4),
    new THREE.Vector2(-35, 6),
    new THREE.Vector2(-26, 10),
    new THREE.Vector2(-18, 12),
    new THREE.Vector2(-10, 10),
    new THREE.Vector2(-4, 7.5),
    new THREE.Vector2(3, 6),
    new THREE.Vector2(10, 8),
    new THREE.Vector2(18, 11),
    new THREE.Vector2(26, 12),
    new THREE.Vector2(34, 10),
    new THREE.Vector2(42, 6),
    new THREE.Vector2(50, 4),
    new THREE.Vector2(58, 5),
    new THREE.Vector2(66, 8),
    new THREE.Vector2(74, 11),
    new THREE.Vector2(80, 12),
  ];

  function makeRibbonGeo(pts, width, yOffset) {
    const subdivisions = 6;
    const allPts = [];
    for (let i = 0; i < pts.length - 1; i++) {
      for (let s = 0; s < subdivisions; s++) {
        const t = s / subdivisions;
        allPts.push(new THREE.Vector2(
          pts[i].x + (pts[i + 1].x - pts[i].x) * t,
          pts[i].y + (pts[i + 1].y - pts[i].y) * t,
        ));
      }
    }
    allPts.push(pts[pts.length - 1]);

    const normals = [];
    for (let i = 0; i < allPts.length; i++) {
      let dx, dz;
      if (i === 0) {
        dx = allPts[1].x - allPts[0].x;
        dz = allPts[1].y - allPts[0].y;
      } else if (i === allPts.length - 1) {
        dx = allPts[i].x - allPts[i - 1].x;
        dz = allPts[i].y - allPts[i - 1].y;
      } else {
        dx = allPts[i + 1].x - allPts[i - 1].x;
        dz = allPts[i + 1].y - allPts[i - 1].y;
      }
      const len = Math.sqrt(dx * dx + dz * dz);
      normals.push({ x: -dz / len, z: dx / len });
    }

    const positions = [];
    for (let i = 0; i < allPts.length - 1; i++) {
      const x0 = allPts[i].x, z0 = allPts[i].y;
      const x1 = allPts[i + 1].x, z1 = allPts[i + 1].y;
      const n0 = normals[i], n1 = normals[i + 1];
      const ax = x0 - n0.x * width, az = z0 - n0.z * width;
      const bx = x0 + n0.x * width, bz = z0 + n0.z * width;
      const cx = x1 + n1.x * width, cz = z1 + n1.z * width;
      const ex = x1 - n1.x * width, ez = z1 - n1.z * width;
      positions.push(
        ax, getGroundY(ax, az) + yOffset, az,
        bx, getGroundY(bx, bz) + yOffset, bz,
        cx, getGroundY(cx, cz) + yOffset, cz,
        ax, getGroundY(ax, az) + yOffset, az,
        cx, getGroundY(cx, cz) + yOffset, cz,
        ex, getGroundY(ex, ez) + yOffset, ez,
      );
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.computeVertexNormals();
    return geo;
  }

  const bankGeo = makeRibbonGeo(points, 1.8, 0.05);
  const bankMat = new THREE.MeshStandardMaterial({ color: 0x7a6a45, roughness: 1.0, side: THREE.DoubleSide });
  const bank = new THREE.Mesh(bankGeo, bankMat);
  bank.receiveShadow = true;
  creekGroup.add(bank);

  const waterGeo = makeRibbonGeo(points, 0.9, 0.08);
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x4499bb,
    roughness: 0.2,
    metalness: 0.1,
    transparent: true,
    opacity: 0.75,
    side: THREE.DoubleSide,
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.receiveShadow = true;
  creekGroup.add(water);

  for (let i = 0; i < 18; i++) {
    const idx = Math.floor(Math.random() * (points.length - 1));
    const t = Math.random();
    const px = points[idx].x + (points[idx + 1].x - points[idx].x) * t;
    const pz = points[idx].y + (points[idx + 1].y - points[idx].y) * t + (Math.random() - 0.5) * 2.8;
    const size = 0.1 + Math.random() * 0.3;
    const segments = 3 + Math.floor(Math.random() * 4);
    const rockGeo = new THREE.SphereGeometry(size, segments, segments);
    const shade = 0.35 + Math.random() * 0.3;
    const warmth = Math.random() * 0.08;
    const rockMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(shade + warmth, shade, shade - warmth * 0.5),
      roughness: 0.85 + Math.random() * 0.15,
    });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    const gy = getGroundY(px, pz);
    rock.position.set(px, gy + size * 0.3, pz);
    rock.scale.set(
      0.7 + Math.random() * 0.6,
      0.3 + Math.random() * 0.5,
      0.7 + Math.random() * 0.6
    );
    rock.rotation.set(Math.random() * 0.3, Math.random() * Math.PI * 2, Math.random() * 0.3);
    rock.castShadow = true;
    creekGroup.add(rock);
  }

  return creekGroup;
}
scene.add(buildCreek());

// --- TREES ---
const snowCaps = [];

function makeTree(x, z, height, trunkRadius) {
  const group = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(trunkRadius * 0.5, trunkRadius, height * 0.5, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3d1e, roughness: 0.9 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = height * 0.25;
  trunk.castShadow = true;
  group.add(trunk);

  const foliageLayers = 4 + Math.floor(Math.random() * 3);
  for (let i = 0; i < foliageLayers; i++) {
    const layerHeight = height * 0.15;
    const layerRadius = (height * 0.18) * (1 - i * 0.12);
    const layerY = height * 0.4 + i * layerHeight * 0.7;
    const coneGeo = new THREE.ConeGeometry(layerRadius, layerHeight, 7);
    const shade = 0.3 + Math.random() * 0.15;
    const originalColor = new THREE.Color(shade * 0.4, shade, shade * 0.3);
    const coneMat = new THREE.MeshStandardMaterial({
      color: originalColor.clone(),
      roughness: 0.8,
    });
    const cone = new THREE.Mesh(coneGeo, coneMat);
    cone.position.y = layerY;
    cone.rotation.y = Math.random() * Math.PI;
    cone.castShadow = true;
    group.add(cone);

    const capGeo = new THREE.ConeGeometry(layerRadius * 0.98, layerHeight * 0.5, 7);
    const capMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, transparent: true, opacity: 0 });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = layerY - layerHeight * 0.25;
    cap.rotation.y = cone.rotation.y;
    cap.visible = false;
    group.add(cap);
    snowCaps.push(cap);
  }

  group.position.set(x, getGroundY(x, z), z);
  group.rotation.y = Math.random() * Math.PI * 2;
  return group;
}

const creekPts = [
  [-80,12],[-68,10],[-55,5],[-44,4],[-35,6],[-26,10],[-18,12],[-10,10],
  [-4,7.5],[3,6],[10,8],[18,11],[26,12],[34,10],[42,6],[50,4],[58,5],[66,8],[74,11],[80,12]
];
function distToCreek(x, z) {
  let minDist = Infinity;
  for (let i = 0; i < creekPts.length - 1; i++) {
    const ax = creekPts[i][0], az = creekPts[i][1];
    const bx = creekPts[i+1][0], bz = creekPts[i+1][1];
    const dx = bx - ax, dz = bz - az;
    const t = Math.max(0, Math.min(1, ((x-ax)*dx + (z-az)*dz) / (dx*dx + dz*dz)));
    const px = ax + t*dx, pz = az + t*dz;
    const d = Math.sqrt((x-px)*(x-px) + (z-pz)*(z-pz));
    if (d < minDist) minDist = d;
  }
  return minDist;
}

const treePositions = [];
for (let i = 0; i < 200; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 7 + Math.random() * 38;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  if (dist < 8 && Math.sqrt(x * x + z * z) < 8) continue;
  if (distToCreek(x, z) < 3) continue;
  const height = 8 + Math.random() * 12;
  const radius = 0.12 + Math.random() * 0.1;
  const tree = makeTree(x, z, height, radius);
  scene.add(tree);
  treePositions.push({ obj: tree, baseX: x, baseZ: z });
}

// --- TENT ---
let tentColor = 0xcc5522;
let tentStyle = 'aframe';
let currentTent = null;

function buildTent(style, color) {
  const tentGroup = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.7 });
  const groundY = getGroundY(-3, -2);

  if (style === 'aframe') {
    const shape = new THREE.Shape();
    shape.moveTo(-1.2, 0);
    shape.lineTo(0, 1.8);
    shape.lineTo(1.2, 0);
    shape.closePath();
    const geo = new THREE.ExtrudeGeometry(shape, { depth: 2.5, bevelEnabled: false });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.y = -Math.PI / 4;
    mesh.position.set(-3, groundY, -2);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    tentGroup.add(mesh);
  } else if (style === 'dome') {
    const geo = new THREE.SphereGeometry(1.8, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(-3, groundY, -2);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    tentGroup.add(mesh);
    const floorGeo = new THREE.CircleGeometry(1.8, 12);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(-3, groundY + 0.02, -2);
    tentGroup.add(floor);
  } else if (style === 'cabin') {
    const bodyGeo = new THREE.BoxGeometry(3.2, 2.0, 2.8);
    const body = new THREE.Mesh(bodyGeo, mat);
    body.position.set(-3, groundY + 1.0, -2);
    body.rotation.y = -Math.PI / 4;
    body.castShadow = true;
    body.receiveShadow = true;
    tentGroup.add(body);
    const roofShape = new THREE.Shape();
    roofShape.moveTo(-1.8, 0);
    roofShape.lineTo(0, 0.8);
    roofShape.lineTo(1.8, 0);
    roofShape.closePath();
    const roofGeo = new THREE.ExtrudeGeometry(roofShape, { depth: 2.8, bevelEnabled: false });
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(-3, groundY + 2.0, -2);
    roof.rotation.y = -Math.PI / 4;
    roof.castShadow = true;
    tentGroup.add(roof);
  } else if (style === 'tunnel') {
    const path = new THREE.LineCurve3(
      new THREE.Vector3(0, 0, -1.5),
      new THREE.Vector3(0, 0, 1.5)
    );
    const tubeGeo = new THREE.TubeGeometry(path, 8, 1.2, 12, false);
    const positions = tubeGeo.attributes.position;
    for (let i = 0; i < positions.count; i++) {
      if (positions.getY(i) < 0) positions.setY(i, 0);
    }
    positions.needsUpdate = true;
    tubeGeo.computeVertexNormals();
    const mesh = new THREE.Mesh(tubeGeo, mat);
    mesh.position.set(-3, groundY, -2);
    mesh.rotation.y = -Math.PI / 4;
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    tentGroup.add(mesh);
  }

  return tentGroup;
}

currentTent = buildTent(tentStyle, tentColor);
scene.add(currentTent);

// --- CAMPFIRE ---
const fireGroup = new THREE.Group();

for (let i = 0; i < 14; i++) {
  const size = 0.08 + Math.random() * 0.12;
  const segments = 3 + Math.floor(Math.random() * 4);
  const rockGeo = new THREE.SphereGeometry(size, segments, segments);
  const shade = 0.25 + Math.random() * 0.25;
  const rockMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(shade + Math.random() * 0.05, shade, shade - Math.random() * 0.03),
    roughness: 0.8 + Math.random() * 0.2,
  });
  const rock = new THREE.Mesh(rockGeo, rockMat);
  const a = (i / 14) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
  const dist = 0.55 + Math.random() * 0.2;
  rock.position.set(Math.cos(a) * dist, size * 0.4, Math.sin(a) * dist);
  rock.scale.set(
    0.8 + Math.random() * 0.5,
    0.4 + Math.random() * 0.4,
    0.8 + Math.random() * 0.5
  );
  rock.rotation.set(Math.random() * 0.4, Math.random() * Math.PI, Math.random() * 0.4);
  rock.castShadow = true;
  fireGroup.add(rock);
}

for (let i = 0; i < 5; i++) {
  const logGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.7, 5);
  const logMat = new THREE.MeshStandardMaterial({ color: 0x3d2810, roughness: 1.0 });
  const log = new THREE.Mesh(logGeo, logMat);
  const angle = (i / 5) * Math.PI * 2;
  log.position.set(Math.cos(angle) * 0.25, 0.25, Math.sin(angle) * 0.25);
  log.rotation.z = Math.PI / 2 - 0.4;
  log.rotation.y = angle;
  fireGroup.add(log);
}

const coals = [];
for (let i = 0; i < 20; i++) {
  const size = 0.03 + Math.random() * 0.06;
  const coalGeo = new THREE.SphereGeometry(size, 4, 3);
  const coalMat = new THREE.MeshStandardMaterial({
    color: 0x1a0800,
    emissive: 0xff3300,
    emissiveIntensity: 0.3 + Math.random() * 0.7,
    roughness: 1.0,
  });
  const coal = new THREE.Mesh(coalGeo, coalMat);
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * 0.4;
  coal.position.set(Math.cos(angle) * dist, 0.05 + Math.random() * 0.1, Math.sin(angle) * dist);
  coal.scale.y = 0.4 + Math.random() * 0.4;
  coals.push(coal);
  fireGroup.add(coal);
}

scene.add(fireGroup);

// --- FIRE PARTICLES ---
const fireParticleCount = 80;
const fireParticlesGeo = new THREE.BufferGeometry();
const firePositions = new Float32Array(fireParticleCount * 3);
const fireSizes = new Float32Array(fireParticleCount);
const fireAlphas = new Float32Array(fireParticleCount);
const fireLifespan = new Float32Array(fireParticleCount);

function respawnFireParticle(i, randomHeight) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 0.08 + Math.random() * 0.3;
  firePositions[i * 3] = Math.cos(angle) * dist;
  firePositions[i * 3 + 1] = randomHeight ? Math.random() * 0.5 : 0;
  firePositions[i * 3 + 2] = Math.sin(angle) * dist;
  const r = Math.random();
  if (r < 0.01) {
    fireLifespan[i] = 0.4 + Math.random() * 2.5;
    fireAlphas[i] = 1;
  } else if (r < 0.08) {
    fireLifespan[i] = 0.5 + Math.random() * 0.4;
    fireAlphas[i] = 0;
  } else {
    fireLifespan[i] = 0.15 + Math.random() * 0.25;
    fireAlphas[i] = 0;
  }
}

for (let i = 0; i < fireParticleCount; i++) {
  respawnFireParticle(i, true);
  fireSizes[i] = 0.15 + Math.random() * 0.15;
  fireAlphas[i] = Math.random();
}
fireParticlesGeo.setAttribute('position', new THREE.BufferAttribute(firePositions, 3));
fireParticlesGeo.setAttribute('size', new THREE.BufferAttribute(fireSizes, 1));

const fireParticleMat = new THREE.PointsMaterial({

  size: 0.25,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,

const fireParticles = new THREE.Points(fireParticlesGeo, fireParticleMat);

// --- LOG SEATS ---
function makeLogSeat(x, z, rotY) {
  const geo = new THREE.CylinderGeometry(0.2, 0.22, 1.8, 7);
  const mat = new THREE.MeshStandardMaterial({ color: 0x4a3018, roughness: 0.9 });
  const log = new THREE.Mesh(geo, mat);
  log.position.set(x, getGroundY(x, z) + 0.22, z);
  log.rotation.z = Math.PI / 2;
  log.rotation.y = rotY;
  log.castShadow = true;
  log.receiveShadow = true;
  return log;
}

scene.add(makeLogSeat(-0.5, 2.0, 1.2));

  group.add(lid);

  group.position.set(2.5, getGroundY(2.5, -1.5), -1.5);

scene.add(buildCooler());

// --- LANTERN ---

// --- SKY ---
function getSkyColor(hour) {
  if (hour < 5 || hour > 22.5) return new THREE.Color(0x0a0a1a);
  if (hour < 5.5) return new THREE.Color(0x1a1a3a).lerp(new THREE.Color(0x443355), (hour - 5) * 2);
  if (hour < 6.5) return new THREE.Color(0x443355).lerp(new THREE.Color(0xff8844), (hour - 5.5));
  if (hour < 7.5) return new THREE.Color(0xff8844).lerp(new THREE.Color(0x66aadd), (hour - 6.5));
  if (hour < 20) return new THREE.Color(0x66aadd);
  if (hour < 20.5) return new THREE.Color(0x66aadd).lerp(new THREE.Color(0xff8844), (hour - 20) * 2);
  if (hour < 21.5) return new THREE.Color(0xff8844).lerp(new THREE.Color(0x553344), (hour - 20.5));
  if (hour < 22.5) return new THREE.Color(0x553344).lerp(new THREE.Color(0x0a0a1a), (hour - 21.5));
  return new THREE.Color(0x0a0a1a);
}

function getSunIntensity(hour) {
  if (hour < 6 || hour > 21.5) return 0;
  if (hour < 7.5) return (hour - 6) / 1.5;
  if (hour > 20) return (21.5 - hour) / 1.5;
  return 1.0;
}

// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let fireNoiseNode = null;
let rainNoiseNode = null;

function startFireAudio() {
  if (fireNoiseNode) return;
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.03;
    if (Math.random() < 0.001) data[i] *= 8;
  }
  fireNoiseNode = audioCtx.createBufferSource();
  fireNoiseNode.buffer = buffer;
  fireNoiseNode.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.3;
  fireNoiseNode.connect(filter).connect(gain).connect(audioCtx.destination);
  fireNoiseNode.start();
}

function startRainAudio() {
  if (rainNoiseNode) return;
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.08;
  }
  rainNoiseNode = audioCtx.createBufferSource();
  rainNoiseNode.buffer = buffer;
  rainNoiseNode.loop = true;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 3000;
  filter.Q.value = 0.5;
  const gain = audioCtx.createGain();
  gain.gain.value = 0.15;
  rainNoiseNode.connect(filter).connect(gain).connect(audioCtx.destination);
  rainNoiseNode.start();
}

function stopRainAudio() {
  if (rainNoiseNode) {
    rainNoiseNode.stop();
    rainNoiseNode = null;
  }
}

document.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  startFireAudio();
}, { once: true });

// --- UPDATE LIGHTING ---
function updateLighting() {
  const hour = timeOfDay;
  const skyColor = getSkyColor(hour);
  scene.background = skyColor;
  scene.fog.color.copy(skyColor);

  const sunIntensity = getSunIntensity(hour);
  sunLight.intensity = sunIntensity * 1.5;

  const sunAngle = ((hour - 6) / 15.5) * Math.PI;
  sunLight.position.set(Math.cos(sunAngle) * 20, Math.sin(sunAngle) * 20, 5);

  if (hour < 7 || hour > 20.5) {
    sunLight.color.set(0xff8844);
  } else if (hour < 8 || hour > 20) {
    sunLight.color.set(0xffcc88);
  } else {
    sunLight.color.set(0xffffff);
  }

  const isNight = hour < 5.5 || hour > 21.5;
  moonLight.intensity = isNight ? 0.2 : 0;
  ambientLight.intensity = 0.15 + sunIntensity * 0.4;

  const fireBrightness = isNight ? 3.0 : (hour < 7.5 || hour > 20 ? 2.0 : 1.0);
  fireLight.intensity = fireBrightness;
  fireLight2.intensity = fireBrightness * 0.6;

  renderer.toneMappingExposure = isNight ? 0.6 : 1.0;
}

// --- CONTROLS UI ---
const timeSlider = document.getElementById('time-slider');
const timeDisplay = document.getElementById('time-display');
const windSlider = document.getElementById('wind-slider');
const fogSlider = document.getElementById('fog-slider');
const btnClear = document.getElementById('btn-clear');
const btnRain = document.getElementById('btn-rain');
const btnSnow = document.getElementById('btn-snow');

timeSlider.addEventListener('input', (e) => {
  timeOfDay = parseFloat(e.target.value);
  const h = Math.floor(timeOfDay);
  const m = Math.floor((timeOfDay - h) * 60);
  timeDisplay.textContent = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
});

windSlider.addEventListener('input', (e) => { windStrength = parseInt(e.target.value); });
fogSlider.addEventListener('input', (e) => {
  fogDensity = parseInt(e.target.value);
  scene.fog.density = fogDensity * 0.001;
});

function setWeather(w) {
  weather = w;
  btnClear.classList.toggle('active', w === 'clear');
  btnRain.classList.toggle('active', w === 'rain');
  btnSnow.classList.toggle('active', w === 'snow');
  rain.visible = w === 'rain';
  snowParticles.visible = w === 'snow';
  if (w === 'rain') { startRainAudio(); } else { stopRainAudio(); }
  if (w === 'clear') {
    accumulation = Math.max(0, accumulation - 0.01);
  }
  snowGround.visible = w === 'snow' || snowGroundMat.opacity > 0;
  puddles.forEach(p => { p.visible = w === 'rain' || p.material.opacity > 0; });
}
btnClear.addEventListener('click', () => setWeather('clear'));
btnRain.addEventListener('click', () => setWeather('rain'));
btnSnow.addEventListener('click', () => setWeather('snow'));

// --- TENT CONTROLS ---
const tentColorsDiv = document.getElementById('tent-colors');
const tentStyleSelect = document.getElementById('tent-style');

function rebuildTent() {
  scene.remove(currentTent);
  currentTent = buildTent(tentStyle, tentColor);
  scene.add(currentTent);
}

tentColorsDiv.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-color]');
  if (!btn) return;
  tentColor = parseInt(btn.dataset.color, 16);
  tentColorsDiv.querySelectorAll('button').forEach(b => b.style.borderColor = 'transparent');
  btn.style.borderColor = '#fff';
  rebuildTent();
});

tentStyleSelect.addEventListener('change', (e) => {
  tentStyle = e.target.value;
  rebuildTent();
});

// --- WASD CONTROLS ---
const keys = {};
document.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
});
document.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

// --- ANIMATE ---
const clock = new THREE.Clock();

Math.random = _realRandom;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  const zoomSpeed = 0.3;
  const rotateSpeed = 0.03;
  const tiltSpeed = 0.02;
  if (keys['w'] && keys['shift']) {
    const offset = camera.position.clone().sub(controls.target);
    const radius = offset.length();
    const theta = Math.atan2(offset.x, offset.z);
    let phi = Math.acos(offset.y / radius);
    phi = Math.max(0.1, phi - tiltSpeed);
    offset.x = radius * Math.sin(phi) * Math.sin(theta);
    offset.y = radius * Math.cos(phi);
    offset.z = radius * Math.sin(phi) * Math.cos(theta);
    camera.position.copy(controls.target).add(offset);
  } else if (keys['s'] && keys['shift']) {
    const offset = camera.position.clone().sub(controls.target);
    const radius = offset.length();
    const theta = Math.atan2(offset.x, offset.z);
    let phi = Math.acos(offset.y / radius);
    phi = Math.min(controls.maxPolarAngle, phi + tiltSpeed);
    offset.x = radius * Math.sin(phi) * Math.sin(theta);
    offset.y = radius * Math.cos(phi);
    offset.z = radius * Math.sin(phi) * Math.cos(theta);
    camera.position.copy(controls.target).add(offset);
  } else if (keys['w']) {
    const dist = camera.position.distanceTo(controls.target);
    if (dist > controls.minDistance + zoomSpeed) {
      const dir = new THREE.Vector3().subVectors(controls.target, camera.position).normalize();
      camera.position.addScaledVector(dir, zoomSpeed);
    }
  }
  if (keys['s'] && !keys['shift']) {
    const dist = camera.position.distanceTo(controls.target);
    if (dist < controls.maxDistance - zoomSpeed) {
      const dir = new THREE.Vector3().subVectors(controls.target, camera.position).normalize();
      camera.position.addScaledVector(dir, -zoomSpeed);
    }
  }
  if (keys['a']) {
    const offset = camera.position.clone().sub(controls.target);
    const angle = rotateSpeed;
    const x = offset.x * Math.cos(angle) - offset.z * Math.sin(angle);
    const z = offset.x * Math.sin(angle) + offset.z * Math.cos(angle);
    camera.position.set(controls.target.x + x, camera.position.y, controls.target.z + z);
  }
  if (keys['d']) {
    const offset = camera.position.clone().sub(controls.target);
    const angle = -rotateSpeed;
    const x = offset.x * Math.cos(angle) - offset.z * Math.sin(angle);
    const z = offset.x * Math.sin(angle) + offset.z * Math.cos(angle);
    camera.position.set(controls.target.x + x, camera.position.y, controls.target.z + z);
  }

  controls.update();
  updateLighting();

  fireLight.intensity += (Math.random() - 0.5) * 0.4;
  fireLight.intensity = Math.max(0.5, Math.min(4, fireLight.intensity));
  fireLight2.intensity = fireLight.intensity * 0.6 + (Math.random() - 0.5) * 0.2;

  for (let i = 0; i < coals.length; i++) {
    const pulse = 0.3 + Math.sin(elapsed * (1.5 + i * 0.3) + i * 2) * 0.25 + Math.random() * 0.1;
    coals[i].material.emissiveIntensity = pulse;
  }

  const fp = fireParticlesGeo.attributes.position.array;
  for (let i = 0; i < fireParticleCount; i++) {
    const x = fp[i * 3];
    const y = fp[i * 3 + 1];
    const z = fp[i * 3 + 2];
    const distFromCenter = Math.sqrt(x * x + z * z);

    if (fireAlphas[i] === 1) {
      fp[i * 3] += (Math.random() - 0.5) * 0.003;
      fp[i * 3 + 1] += 0.03 + Math.random() * 0.02;
      fp[i * 3 + 2] += (Math.random() - 0.5) * 0.003;
      fp[i * 3] += windStrength * 0.0002;
    } else if (distFromCenter > 0.06) {
      const pullStrength = 0.006 + distFromCenter * 0.012;
      fp[i * 3] -= (x / distFromCenter) * pullStrength;
      fp[i * 3 + 2] -= (z / distFromCenter) * pullStrength;
      fp[i * 3 + 1] += 0.006 + (1 - distFromCenter) * 0.008;
    } else {
      fp[i * 3] += (Math.random() - 0.5) * 0.003;
      fp[i * 3 + 1] += 0.012 + Math.random() * 0.008;
      fp[i * 3 + 2] += (Math.random() - 0.5) * 0.003;
    }

    fp[i * 3] += windStrength * 0.0001;

    if (fp[i * 3 + 1] > fireLifespan[i]) {
      respawnFireParticle(i, false);
    }
  }
  fireParticlesGeo.attributes.position.needsUpdate = true;

  const sp = smokeGeo.attributes.position.array;
  for (let i = 0; i < smokeCount; i++) {
    sp[i * 3] += smokeVelocities[i].x + (windStrength * 0.0003);
    sp[i * 3 + 1] += smokeVelocities[i].y;
    sp[i * 3 + 2] += smokeVelocities[i].z;
    if (sp[i * 3 + 1] > 5) {
      sp[i * 3] = (Math.random() - 0.5) * 0.3;
      sp[i * 3 + 1] = 1.5;
      sp[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
    }
  }
  smokeGeo.attributes.position.needsUpdate = true;

  if (weather === 'rain') {
    const rp = rainGeo.attributes.position.array;
    for (let i = 0; i < rainCount; i++) {
      rp[i * 3 + 1] -= 0.5 + windStrength * 0.005;
      rp[i * 3] += windStrength * 0.002;
      if (rp[i * 3 + 1] < 0) {
        rp[i * 3] = (Math.random() - 0.5) * 60;
        rp[i * 3 + 1] = 25 + Math.random() * 5;
        rp[i * 3 + 2] = (Math.random() - 0.5) * 60;
      }
    }
    rainGeo.attributes.position.needsUpdate = true;
  }

  if (weather === 'snow') {
    const snp = snowGeo.attributes.position.array;
    for (let i = 0; i < snowCount; i++) {
      snp[i * 3] += Math.sin(elapsed + i) * 0.003 + windStrength * 0.001;
      snp[i * 3 + 1] -= 0.03 + Math.random() * 0.01;
      snp[i * 3 + 2] += Math.cos(elapsed + i * 1.3) * 0.003;
      if (snp[i * 3 + 1] < 0) {
        snp[i * 3] = (Math.random() - 0.5) * 60;
        snp[i * 3 + 1] = 20 + Math.random() * 5;
        snp[i * 3 + 2] = (Math.random() - 0.5) * 60;
      }
    }
    snowGeo.attributes.position.needsUpdate = true;
  }

  if (weather === 'snow') {
    accumulation = Math.min(1, accumulation + 0.0003);
    snowGround.visible = true;
    snowGroundMat.opacity = accumulation * 0.85;
    for (const cap of snowCaps) {
      cap.visible = true;
      cap.material.opacity = accumulation * 0.9;
    }
    snowCaps.forEach(m => { if (m.material.opacity > 0) m.visible = true; });
  } else if (weather === 'rain') {
    accumulation = Math.min(1, accumulation + 0.0005);
    puddles.forEach(p => {
      p.visible = true;
      p.material.opacity = Math.min(0.7, accumulation * 0.7);
    });
  } else {
    if (accumulation > 0) {
      accumulation = Math.max(0, accumulation - 0.0002);
      snowGroundMat.opacity = accumulation * 0.85;
      puddles.forEach(p => { p.material.opacity = accumulation * 0.7; });
      for (const cap of snowCaps) {
        cap.material.opacity = accumulation * 0.9;
      }
      if (accumulation <= 0) {
        snowGround.visible = false;
        puddles.forEach(p => { p.visible = false; });
        snowCaps.forEach(c => { c.material.opacity = 0; c.visible = false; });
      }
    }
  }

  for (const t of treePositions) {
    const sway = Math.sin(elapsed * 0.5 + t.baseX * 0.3) * windStrength * 0.0003;
    t.obj.rotation.z = sway;
    t.obj.rotation.x = sway * 0.5;
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
